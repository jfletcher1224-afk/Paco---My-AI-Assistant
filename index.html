<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Paco</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>PACO</h1>
  <button id="settingsBtn" title="Settings">⚙</button>
</header>
<input id="email" type="text" placeholder="email">
<input id="password" type="password" placeholder="password">
<button id="loginBtn"> Login</button>

<main>
  <canvas id="hud" width="480" height="420"></canvas>
  <div id="status">IDLE</div>
  <div id="transcript"></div>

  <div id="controls">
    <button id="talkBtn">🎤 HOLD TO TALK</button>
    <form id="textForm" autocomplete="off">
      <input id="textInput" type="text" placeholder="...or type to Paco" />
      <button id="sendBtn" type="submit">SEND</button>
    </form>
  </div>
</main>

<div id="settingsOverlay" class="hidden">
  <div id="settingsPanel">
    <h2>Settings</h2>

    <label for="apiKey">Anthropic API Key</label>
    <input id="apiKey" type="password" placeholder="sk-ant-..." autocomplete="off" />
    <p class="hint">Stored only in this browser's local storage. Never saved to a file. Never share this key.</p>
    <p class="hint" id="apiKeyPreview"></p>

    <label for="model">Model</label>
    <select id="model">
      <option value="claude-sonnet-5">Sonnet 5 (balanced)</option>
      <option value="claude-opus-4-8">Opus 4.8 (most capable)</option>
      <option value="claude-haiku-4-5-20251001">Haiku 4.5 (fastest)</option>
    </select>

    <label for="voice">Voice</label>
    <select id="voice"></select>

    <div class="settingsActions">
      <button id="saveSettings">SAVE</button>
      <button id="clearKey">CLEAR KEY</button>
      <button id="closeSettings">CLOSE</button>
    </div>
  </div>
</div>

<script>
  import { startPaco } from "./app.js";
  import {initializeApp }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js"; 
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js"; 
  const firebaseConfig = { apiKey: "AIzaSyBG0_JSfjYyD-JUth0-tD5-GHCpyX9VtPE", authDomain: "paco---my-ai-assistant.firebaseapp.com", projectId: "paco---my-ai-assistant", storageBucket: "paco---my-ai-assistant.firebasestorage.app", messagingSenderId:"813461861331", 
   appId: "1:813461861331:web:9deaf3fb206cb7c05db526" }; 
  const app = initializeApp(firebaseConfig); 
  const auth = getAuth(app); 
  const loginBtn = document.getElementById("loginBtn"); 
  const emailInput = document.getElementById("email"); 
  const passwordInput = document.getElementById("password"); 
  let pacoStarted = false; 
  loginBtn.addEventListener("click", () => { const email = emailInput.value.trim(); const password = passwordInput.value; 
  signInWithEmailAndPassword(auth, email, password) .catch((err) => alert("Login failed: " + err.message)); }); 
  onAuthStateChanged(auth, (user) => { if (user && !pacoStarted) { pacoStarted = true; emailInput.style.display = "none"; passwordInput.style.display = "none"; loginBtn.style.display = "none"; document.querySelector("main").style.display = "block"; startPaco(); } });
</script>
</body>
</html>
